server:
  port: 8090

spring:
  application:
    name: guild-quest
  rabbitmq:
    addresses: ${AMQP_URL}
    ssl:
      enabled: ${AMQP_SSL_ENABLED:false}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

hero:
  ollama:
    url: ${OLLAMA_URL:http://localhost:11434}

guild:
  amqp:
    exchange: ${AMQP_EXCHANGE:skillforge}
    heartbeat-interval-ms: 60000
    heartbeat-initial-delay-ms: 5000

skillforge:
  hero:
    id: guild-quest
    name: Guild Quest
    skills: quest-design,domain-modeling,fixture-generation
  github:
    token: ${GITHUB_TOKEN:}
    owner: ${GITHUB_OWNER:}
    repo:  ${GITHUB_REPO:skillforge}
  quests:
    root: ${SKILLFORGE_QUESTS_ROOT:quests}
  quest:
    validator-model:      ${VALIDATOR_MODEL:meditron}
    confidence-threshold: ${CONFIDENCE_THRESHOLD:0.75}

logging:
  level:
    com.skillforge: INFO
    org.apache.catalina.connector: WARN