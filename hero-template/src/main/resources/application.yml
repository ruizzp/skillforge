server:
  port: 8081

spring:
  application:
    name: skillforge-hero
  rabbitmq:
    addresses: ${AMQP_URL}
    ssl:
      enabled: ${AMQP_SSL_ENABLED:false}

guild:
  github:
    owner: fidelisfelipe  # owner do repo PRINCIPAL (não o seu fork)
    repo: skillforge       # nome do repo principal
    token: ${GITHUB_TOKEN:}
  hub:
    enabled: false  # nunca mude isso — o hub é um módulo separado (guild-hub)
  amqp:
    exchange: ${AMQP_EXCHANGE:skillforge}
    queue: ${AMQP_QUEUE:skillforge.problems}
    heartbeat-interval-ms: ${HEARTBEAT_INTERVAL_MS:60000}

logging:
  level:
    com.skillforge: INFO