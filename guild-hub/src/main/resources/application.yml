server:
  port: 8080

spring:
  application:
    name: guild-hub
  rabbitmq:
    addresses: ${AMQP_URL}
    ssl:
      enabled: ${AMQP_SSL_ENABLED:false}

guild:
  github:
    owner: fidelisfelipe
    repo: skillforge
    token: ${GITHUB_TOKEN:}
  amqp:
    exchange: ${AMQP_EXCHANGE:skillforge}
    queue: ${AMQP_QUEUE:skillforge.problems}

skillforge:
  skill-validation:
    confidence-threshold: ${SKILL_CONFIDENCE_THRESHOLD:0.75}
  heartbeat:
    timeout-ms: ${HEARTBEAT_TIMEOUT_MS:180000}        # 3 min sem heartbeat = offline
    check-interval-ms: ${HEARTBEAT_CHECK_INTERVAL_MS:60000}  # verifica a cada 1 min

logging:
  level:
    com.skillforge: INFO
    org.apache.catalina.connector: WARN  # suprime Broken pipe / ClientAbortException de SSE
    rabbitmq: DEBUG
  pattern:
    console: "%d{HH:mm:ss} %highlight(%-5level) %cyan(%-30logger{30}) %msg%n"
